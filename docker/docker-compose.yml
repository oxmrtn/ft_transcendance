services:
  db:
    image: docker.io/library/postgres:15-alpine
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
      POSTGRES_DB: ${DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - transcendence
    
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "8443:443"
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_started
      front:
        condition: service_healthy
    networks:
      - transcendence
    secrets:
      - ssl_key
      - ssl_crt

  backend:
    build:
      context: ..
      dockerfile: ./docker/back/Dockerfile
    container_name: backend
    restart: always
    env_file:
      - ./.env
    environment:
      NODE_ENV: ${NODE_ENV}
    volumes:
      - ../srcs/backend:/app
      - ../srcs/sandbox/tester/submissions:/app/submissions
      - ../srcs/sandbox/tester/results:/app/results
    depends_on:
      db:
        condition: service_healthy
    networks:
      - transcendence
    secrets:
      - ssl_key
      - ssl_crt

  front:
    container_name: front
    build:
      context: ..
      dockerfile: docker/front/Dockerfile
    volumes:
      - ../srcs/front:/app
      - nextjs:/app/.next
    env_file:
      - ./.env
    environment:
      NODE_ENV: ${NODE_ENV}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('https').get({host:'localhost',port:3000,path:'/',rejectUnauthorized:false},(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - transcendence
    secrets:
      - ssl_key
      - ssl_crt

  sandbox:
    container_name: sandbox
    privileged: true
    build:
      context: ..
      dockerfile: docker/sandbox/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
    volumes:
      - ../srcs/sandbox:/app
    networks:
      - transcendence

volumes:
  postgres_data:
  nextjs:

networks:
  transcendence:
    driver: bridge

secrets:
  ssl_key:
    file: ./secrets/VersusCode.key
  ssl_crt:
    file: ./secrets/VersusCode.crt
